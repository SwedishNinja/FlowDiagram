name: Release

# Build the Windows installer (+ portable zip) on a native Windows runner
# whenever a vX.Y.Z tag is pushed, and attach the artifacts to a GitHub
# Release. No wine needed — electron-builder runs natively on windows-latest.
on:
  push:
    tags:
      - 'v*'
  # Allow building from the Actions tab without tagging (no publish).
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build renderer
        run: npm run build

      - name: Build & publish installer
        # On a tag push, publish to the GitHub Release for that tag.
        # On manual dispatch, build artifacts only (never publishes).
        run: npx electron-builder --win nsis zip --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            release/*Setup*.exe
            release/*-win-x64.zip
          if-no-files-found: error
